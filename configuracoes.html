<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAC Serviços | Configurações</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔧</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div id="toast-container"></div>

    <main>
        <header class="screen-header">
            <a href="index.html" class="btn-back"><i data-lucide="chevron-left"></i> Voltar</a>
            <h1>Ajustes</h1>
            <div style="width: 60px;"></div>
        </header>

        <div class="screen-content">
            <div class="form-container">
                <form id="settings-form">
                    <div class="form-grid">
                        <div class="form-group"><label>Seu Nome / Empresa</label><input type="text" id="set-name" placeholder="Ex: Miranda Manutenções"></div>
                        <div class="form-group"><label>Seu WhatsApp</label><input type="text" id="set-phone" placeholder="Seu número"></div>
                        <div class="form-group"><label>Chave PIX (Para Relatórios)</label><input type="text" id="set-pix" placeholder="CPF, E-mail ou Celular"></div>
                        <div class="form-group"><label>Valor Padrão por Hora (R$)</label><input type="number" step="0.01" id="set-hour-rate"></div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="margin-top: 1.5rem; width: 100%;"><i data-lucide="save"></i> SALVAR DADOS</button>
                </form>
            </div>
            
            <div class="form-container">
                <label style="display: block; margin-bottom: 1rem;">Backup e Segurança</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <button class="btn btn-secondary" onclick="exportData()"><i data-lucide="download"></i> Exportar</button>
                    <label class="btn btn-secondary" style="margin:0; cursor: pointer;">
                        <i data-lucide="upload"></i> Importar
                        <input type="file" id="import-file" style="display:none" onchange="importData(event)">
                    </label>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/app.js"></script>
</body>
</html>
