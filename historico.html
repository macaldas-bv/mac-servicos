<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAC Serviço e Manutenção | Histórico</title>
    <link rel="icon" href="assets/logo.png">
    <link rel="apple-touch-icon" href="assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div id="toast-container"></div>

    <main>
        <header class="screen-header">
            <a href="index.html" class="btn-back"><i data-lucide="chevron-left"></i> Voltar</a>
            <h1>Relatórios</h1>
            <div style="width: 60px;"></div>
        </header>

        <div class="screen-content">
            <!-- Filter Bar -->
            <div class="form-container" style="margin-bottom: 1.5rem; padding: 1rem;">
                <div class="form-grid" style="grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Buscar Cliente ou Nº da OS</label>
                        <input type="text" id="filter-search" placeholder="Ex: João ou 001/26">
                    </div>
                    <div class="form-group">
                        <label>Mês</label>
                        <input type="month" id="filter-month">
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        <button id="btn-filter" class="btn btn-primary" style="width: 100%; padding: 0.8rem;">
                            <i data-lucide="search"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Summary Card -->
            <div id="report-summary" class="stat-card" style="margin-bottom: 1.5rem; display: none; background: var(--primary-light); border-color: var(--primary-color);">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <span class="stat-label" style="color: var(--primary-color)">Total do Período</span>
                        <span class="stat-value primary" id="report-total" style="font-size: 1.75rem;">R$ 0,00</span>
                        <small id="report-count" style="color: var(--text-secondary); font-weight: 600;"></small>
                    </div>
                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: flex-end;">
                        <button id="btn-send-receipt" class="btn btn-secondary" style="padding: 0.8rem 1.2rem; border: 1px solid var(--border-color);">
                            <i data-lucide="file-text"></i> Recibo
                        </button>
                        <button id="btn-send-report" class="btn btn-whatsapp" style="padding: 0.8rem 1.2rem;">
                            <i data-lucide="send"></i> Relatório
                        </button>
                    </div>
                </div>
            </div>

            <div id="history-list" class="card-list"></div>
        </div>
    </main>

    <script src="assets/app.js"></script>
</body>
</html>
