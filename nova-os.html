<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAC Serviços | Nova OS</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔧</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div id="toast-container"></div>

    <main>
        <header class="screen-header">
            <a href="index.html" class="btn-back"><i data-lucide="chevron-left"></i> Voltar</a>
            <h1>Nova OS</h1>
            <div style="width: 60px;"></div>
        </header>

        <div class="screen-content">
            <div class="form-container">
                <form id="os-form">
                    <input type="hidden" id="os-id">
                    <div class="form-grid">
                        <div class="form-group" style="grid-column: 1 / -1;"><label>Cliente *</label><select id="os-client" required><option value="">Selecione o cliente...</option></select></div>
                        <div class="form-group"><label>Data</label><input type="date" id="os-date" required></div>
                        <div class="form-group" style="grid-column: 1 / -1;"><label>Descrição do Serviço *</label><textarea id="os-desc" required placeholder="O que foi realizado?"></textarea></div>
                        <div class="form-group"><label>Cobrança</label><select id="os-type"><option value="fixo">Valor Fechado</option><option value="hora">Por Hora</option></select></div>
                        <div class="form-group" id="group-fixo"><label>Valor Total (R$)</label><input type="number" step="0.01" id="os-val-fixo" placeholder="0,00"></div>
                        <div class="form-group" id="group-hora" style="display:none"><label>Valor/Hora (R$)</label><input type="number" step="0.01" id="os-val-hour"></div>
                        <div class="form-group" id="group-hora-2" style="display:none"><label>Horas Trabalhadas</label><input type="number" step="0.1" id="os-hours" placeholder="Ex: 2.5"></div>
                        <div class="form-group" style="grid-column: 1 / -1;"><label>Materiais Utilizados</label><input type="text" id="os-mat" placeholder="Ex: Parafusos, cabos..."></div>
                        <div class="form-group"><label>Valor dos Materiais (R$)</label><input type="number" step="0.01" id="os-val-mat" placeholder="0,00"></div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="margin-top: 2rem; width: 100%;"><i data-lucide="check-circle"></i> FINALIZAR OS</button>
                </form>
            </div>
        </div>
    </main>

    <script src="assets/app.js"></script>
</body>
</html>
